name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@vNOM
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.jks \
            -alias order-cook-app \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass order123456 \
            -keypass order123456 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=BJ, ST=BJ, C=CN"

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'PROPS'
          storePassword=order123456
          keyPassword=order123456
          keyAlias=order-cook-app
          storeFile=../app/release.jks
          PROPS

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Sign APK with apksigner (v1+v2+v3)
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks android/app/release.jks \
            --ks-key-alias order-cook-app \
            --ks-pass pass:order123456 \
            --key-pass pass:order123456 \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Verify signature
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: order-cook-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
