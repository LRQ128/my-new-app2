name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-iouke.cn

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias order-cook-app \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass order.cook123 \
            -keypass order.cook123 \
            -dname "CN=LRQ128, OU=Dev, O=Personal, L=Beijing, ST=Beijing, C=CN"

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=order.cook123
          keyPassword=order.cook123
          keyAlias=order-cook-app
          storeFile=../app/release.keystore
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: order-cook-app-release
          path: build/app/outputs/flutter-apk/app-release.apk
