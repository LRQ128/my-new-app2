apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'

def flutterSdkPath = System.getenv('FLUTTER_ROOT')
if (flutterSdkPath == null) {
    Properties properties = new Properties()
    file("$rootDir/local.properties").withInputStream { properties.load(it) }
    flutterSdkPath = properties.getProperty('flutter.sdk')
}
apply from: "$flutterSdkPath/packages/flutter_tools/gradle/flutter.gradle"

android {
    namespace 'com.example.order_cook_app'
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId 'com.example.order_cook_app'
        minSdk 21
        targetSdk flutter.targetSdkVersion
        versionCode 1
        versionName '1.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
